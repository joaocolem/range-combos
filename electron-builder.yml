appId: com.rangecombos.app
productName: Range Combos
directories:
  output: dist
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.*.json}'
  - '!{.env,.env.*,.github}'
asarUnpack:
  - resources/**

# Auto-update via GitHub Releases (repo publico joaocolem/range-combos).
publish:
  provider: github
  owner: joaocolem
  repo: range-combos

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# Para assinar o Windows depois: defina CSC_LINK e CSC_KEY_PASSWORD no CI.
