name: release

# Push na main = producao: builda o Windows e publica um Release no GitHub.
# Lembre de subir a versao em package.json a cada release (ex.: 0.1.0 -> 0.1.1),
# senao o electron-builder tenta sobrescrever um release existente.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build e publicar
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para assinar o Windows depois, adicione os secrets e descomente:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
